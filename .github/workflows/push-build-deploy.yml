name: Build and deploy

permissions:
  id-token: write # Require write permission to Fetch an OIDC token.

on:
  push:
    branches: [ master ]
  # Allow manually triggering deployment
  workflow_dispatch:

jobs:
  build:
    name: Build and deploy
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}

    - name: Set up cache for NPM modules
      uses: actions/cache@v5
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install dependencies
      run: npm i --no-audit

    - name: Compile to JavaScript
      run: npm run build
      env:
        CI: true

    - name: Rebuild better-sqlite3
      run: |
        npm rebuild better_sqlite3
        npm rebuild

    - name: Prune dependencies
      run: npm prune --production

    - name: Deploy
      uses: mojira/deploy@main
      with:
        vps_host: ${{ secrets.VPS_HOST }}
        vps_ssh_key: ${{ secrets.VPS_SSH_KEY }}
        vps_known_hosts: ${{ secrets.VPS_KNOWN_HOSTS }}
        artifact_paths: |
          bin/
          node_modules/
        artifact_destination: discord-bot
        script: |
          cd discord-bot
          git pull
          ./restart.sh main
